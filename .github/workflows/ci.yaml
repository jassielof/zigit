name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Zig
        uses: jassielof/setup-zig@v1
        with:
          cache: true

      - name: Formatting
        run: zig fmt .

      - name: Build
        run: zig build --summary all

  tests:
    needs: build
    name: Tests
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Zig
        uses: jassielof/setup-zig@v1
        with:
          cache: true

      - name: Run test suite
        run: zig build --summary all tests

      - name: Attempt to install an app
        run: |
          zig build cli -- install https://github.com/jassielof/docent
          docent --version
