name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Zig
        uses: jassielof/setup-zig@v1
        with:
          cache: true

      - name: Formatting
        run: zig fmt .

      - name: Build
        run: zig build --summary all

  tests:
    needs: build
    name: Testing
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Zig
        uses: jassielof/setup-zig@v1

      # zigit installs to ~/.local/bin (Unix) or %LOCALAPPDATA%\Programs\zigit\bin (Windows);
      # those dirs are not always on PATH (especially on Windows runners).
      - name: Add zigit install bin to PATH
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "$LOCALAPPDATA/Programs/zigit/bin" >> "$GITHUB_PATH"
          else
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Attempt to install an app
        run: zig build cli --summary all -- install https://github.com/jassielof/docent

      - name: Check if the app was installed correctly
        run: docent --version

      - name: Check if it's listed
        run: zig build cli --summary all -- list | grep "docent"

      - name: Uninstall the app
        run: zig build cli --summary all -- uninstall docent --yes

      - name: Check if the app was uninstalled correctly
        run: zig build cli --summary all -- list | grep -v "docent"

      - name: Check ability to install from a local path (the project itself)
        run: zig build cli --summary all -- install ./

      - name: Check if the app was installed correctly
        run: zigit --version

      - name: Uninstall the app
        run: zig build cli --summary all -- uninstall zigit --yes

      - name: Check if the app was uninstalled correctly
        run: zig build cli --summary all -- list | grep -v "zigit"
